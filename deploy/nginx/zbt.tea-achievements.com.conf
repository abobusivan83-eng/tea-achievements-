# Staging (ЗБТ): https://zbt.tea-achievements.com
# Backend на отдельном порту (например 4001), чтобы не конфликтовать с production.

upstream tea_api_staging {
    server 127.0.0.1:4001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name zbt.tea-achievements.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://zbt.tea-achievements.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zbt.tea-achievements.com;

    ssl_certificate     /etc/letsencrypt/live/zbt.tea-achievements.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zbt.tea-achievements.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/tea-achievements-staging/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/tea-zbt.access.log;
    error_log  /var/log/nginx/tea-zbt.error.log warn;

    location /api/ {
        proxy_pass http://tea_api_staging;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        client_max_body_size 25m;
    }

    location /uploads/ {
        proxy_pass http://tea_api_staging;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        client_max_body_size 25m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
