map $http_x_staging_access_token $staging_token_ok {
  default 0;
  "CHANGE_ME_ZBT_TOKEN" 1;
}

geo $staging_ip_ok {
  default 0;
  127.0.0.1/32 1;
  10.0.0.1/32 1;
}

map "$staging_ip_ok:$staging_token_ok" $staging_allowed {
  default 0;
  "1:0" 1;
  "0:1" 1;
  "1:1" 1;
}

server {
  listen 80;
  server_name zbt.tea-achievements.com;

  if ($staging_allowed = 0) {
    return 403;
  }

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Staging-Access-Token $http_x_staging_access_token;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Staging-Access-Token $http_x_staging_access_token;
  }
}
